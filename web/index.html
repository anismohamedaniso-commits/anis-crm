<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Anis CRM — Manage leads, conversations, and follow-ups">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Anis CRM">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Anis CRM</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Dev helper: programmatically import CSV into localStorage for troubleshooting imports -->
  <script>
    window.devImportCSV = function (csvText) {
      try {
        const lines = csvText.split(/\r?\n/).filter(l => l.trim());
        if (!lines.length) return console.log('devImportCSV: empty');
        const headers = lines[0].split(/,|;/).map(h => h.trim().toLowerCase());
        const rows = lines.slice(1).map(l => l.split(/,|;/));
        const existing = JSON.parse(localStorage.getItem('leads_v1') || '[]');
        for (const r of rows) {
          if (!r.length) continue;
          const obj = {};
          headers.forEach((h, i) => obj[h] = (r[i] || '').trim());
          if (!obj.name) continue;
          const id = 'imp_' + Math.random().toString(36).substring(2, 10);
          const now = new Date().toISOString();
          existing.push({
            id: id,
            name: obj.name,
            status: 'interested',
            phone: obj.phone || null,
            email: obj.email || null,
            source: 'imported',
            campaign: obj.campaign || null,
            created_at: now,
            updated_at: now
          });
        }
        localStorage.setItem('leads_v1', JSON.stringify(existing));
        console.log('devImportCSV: imported', existing.length, 'leads');
        try { console.log('devImportCSV: snapshot', JSON.stringify(existing).slice(0, 500)); } catch(e) {}
        window.location.reload();
      } catch (e) { console.error('devImportCSV failed', e); }
    }
  </script>
</body>
</html>
